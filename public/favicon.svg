  <rect width="512" height="512" fill="#0a0a0a" rx="64"/>

  <rect x="0" y="232" width="512" height="48" fill="url(#rayWhisper)" opacity="0.6"/>
  <rect x="0" y="244" width="512" height="24" fill="url(#raySoft)"/>
  <rect x="0" y="251" width="512" height="10" fill="url(#rayMain)"/>
  <rect x="0" y="254" width="512" height="4" fill="#FFE89A"/>

  <circle cx="256" cy="256" r="180" fill="url(#sunGlow)" opacity="0.85"/>
  <circle cx="256" cy="256" r="128" fill="url(#sunCore)"/>
  <circle cx="256" cy="256" r="98" fill="#FFE89A"/>
  <circle cx="256" cy="256" r="88" fill="#FFD966"/>

  <text x="256" y="320" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="158" font-weight="700" fill="#0a0a0a">S</text>
