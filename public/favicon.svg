      <stop offset="50%" stop-color="#FFE89A" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#E8B530" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="rayWhisper" x1="0%" y1="50%" x2="100%" y2="50%">
