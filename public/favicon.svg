<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFF4C2" stop-opacity="1"/>
      <stop offset="35%" stop-color="#FFD966" stop-opacity="0.95"/>
      <stop offset="70%" stop-color="#E8B530" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#8B6914" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sunCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="40%" stop-color="#FFE89A" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#F5C842" stop-opacity="0.7"/>
    </radialGradient>
    <linearGradient id="rayMain" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#F5C842" stop-opacity="0"/>
      <stop offset="50%" stop-color="#FFD966" stop-opacity="1"/>
      <stop offset="100%" stop-color="#F5C842" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="raySoft" x1="0%" y1="50%" x2="100%" y2="50%">
